<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassQuiz Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-decor">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <main class="glass-shell">
        <section id="reg-page" class="view">
            <h1>Create Account</h1>
            <p>Join the learning community</p>
            <div class="input-group">
                <input type="text" id="reg-name" placeholder="Full Name">
                <input type="email" id="reg-email" placeholder="Email Address">
                <button id="register-btn">Create Profile</button>
            </div>
        </section>

        <section id="dash-page" class="view hidden">
            <header class="user-info">
                <h2 id="welcome-msg">Hi, User!</h2>
                <div class="stat-pill">Total Points: <span id="total-points">0</span></div>
            </header>

            <div class="tabs">
                <button class="tab-btn active" data-target="tech-quiz">Tech</button>
                <button class="tab-btn" data-target="science-quiz">Science</button>
                <button class="tab-btn" data-target="history-quiz">History</button>
            </div>

            <div id="quiz-container" class="content-box">
                <div id="q-text">Select a tab to start!</div>
                <div id="options-grid"></div>
                <div id="feedback" class="hidden"></div>
            </div>

            <div class="progress-container">
                <div id="p-bar"></div>
            </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
